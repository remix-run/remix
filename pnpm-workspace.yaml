allowBuilds:
  '@swc/core': true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  '@types/node': ^24.6.0
  '@typescript/native-preview': 7.0.0-dev.20251125.1
  oxfmt: ^0.51.0
  playwright: ^1.60.0
  typescript: ^5.9.3
  typescript-language-server: ^5.1.3

packages:
  - demos/*
  - docs/api
  - docs/api/src/prerender/bench
  - docs/guides
  - packages/*
  - packages/*/demo
  - packages/assets/bench
  - packages/cli/test/fixtures/*
  - packages/fetch-router/demos/*
  - packages/form-data-parser/demos/*
  - packages/ui/bench
  - packages/ui/bench/frameworks/*
  - packages/lazy-file/scripts
  - packages/multipart-parser/bench
  - packages/multipart-parser/demos/*
  - packages/node-fetch-server/bench
  - packages/node-fetch-server/demos/*
  - packages/route-pattern/bench
  - packages/static-middleware/demos/*
  - packages/tar-parser/bench
  - template
  - scripts

shellEmulator: true
