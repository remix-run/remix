name: PR Actions

# Triggered when "PR Checks" completes. Downloads the artifact produced by
# the upstream workflow and applies the referenced trusted sticky comment with write
# permissions. Never executes PR
# source code — only reads the JSON artifact.

on:
  workflow_run:
    workflows: ['PR Checks']
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_repository.id }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  actions:
    name: PR Actions
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'remix-run/remix'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write

    steps:
      # Check's out the base (main) branch - not the PR branch
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Download result from upstream workflow
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: pr-checks-result
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Apply actions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/pr.ts actions pr-checks-result.json
