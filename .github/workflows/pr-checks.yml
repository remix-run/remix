name: PR Checks

# Read-only PR inspection. Computes a trusted sticky comment reference and uploads it
# as an artifact. The PR Actions workflow consumes the artifact and applies it with write
# permissions — keeping that step out of the PR's untrusted code path.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: PR Checks
    if: github.repository == 'remix-run/remix'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check changed files
        env:
          GH_TOKEN: ${{ github.token }}
        id: changed-files
        run: |
          changed_files="$(gh pr diff "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --name-only)"

          should_skip="false"

          while IFS= read -r file; do
            case "$file" in
              package.json) should_skip="true" ;;
              scripts/*) should_skip="true" ;;
            esac
          done <<< "$changed_files"

          if [ "$should_skip" = "true" ]; then
            echo "PR changes package.json or scripts/; skipping community helper checks."
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          else
            echo "mode=run" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.changed-files.outputs.mode == 'run'
        uses: actions/checkout@v7

      - name: Setup pnpm
        if: steps.changed-files.outputs.mode == 'run'
        uses: pnpm/action-setup@v6

      - name: Setup node
        if: steps.changed-files.outputs.mode == 'run'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install deps
        if: steps.changed-files.outputs.mode == 'run'
        run: pnpm install --frozen-lockfile

      - name: Run checks
        if: steps.changed-files.outputs.mode == 'run'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: node scripts/pr.ts check pr-checks-result.json

      - name: Upload result
        uses: actions/upload-artifact@v7
        with:
          name: pr-checks-result
          path: pr-checks-result.json
          if-no-files-found: ignore
